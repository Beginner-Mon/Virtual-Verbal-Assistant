[pytest]
testpaths = tests
pythonpath = agenticRAG/agentic_rag_gemini
             text-to-motion/DART
             SpeechLLm
python_files = test_*.py
python_classes = Test*
python_functions = test_*

addopts =
    -v
    --tb=short
    --strict-markers
    --strict-config
    -ra
    --durations=5

markers =
    unit: No I/O, pure logic
    integration: Requires running services (DB, Redis, etc.)
    e2e: Full stack, runs against staging
    slow: Over 2 seconds

asyncio_mode = auto
asyncio_default_fixture_loop_scope = function

filterwarnings =
    error
    ignore::DeprecationWarning
    ignore::ResourceWarning
    ignore::ImportWarning
    ignore::pytest.PytestUnraisableExceptionWarning
    ignore::UserWarning

log_cli = false
log_level = WARNING

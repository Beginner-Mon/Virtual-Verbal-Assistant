name: Release Unit Tests

on:
  push:
    branches:
      - release
  workflow_dispatch:

concurrency:
  group: release-tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─────────────────────────────────────────────────────────────────────────────
  # Unit tests — matrix strategy for isolated environments
  #
  # Each matrix entry gets a FRESH runner with its own pip env.
  # Tests run from the repo root so pytest.ini + conftest.py work correctly.
  # ─────────────────────────────────────────────────────────────────────────────
  unit-tests:
    name: "🧪 ${{ matrix.module_name }}"
    runs-on: windows-latest
    timeout-minutes: ${{ matrix.timeout }}

    strategy:
      fail-fast: false   # Don't cancel SpeechLLm if AgenticRAG fails
      matrix:
        include:
          - module_name: "AgenticRAG Gemini"
            requirements: "agenticRAG/agentic_rag_gemini/requirements.txt"
            test_dir: "tests/agenticRAG"
            python_version: "3.11"
            extra_pythonpath: "agenticRAG/agentic_rag_gemini"
            artifact_name: "agenticrag-test-results"
            timeout: 20

          - module_name: "SpeechLLm"
            requirements: "SpeechLLm/requirements.txt"
            test_dir: "tests/SpeechLLm"
            python_version: "3.11"
            extra_pythonpath: "SpeechLLm"
            artifact_name: "speechllm-test-results"
            timeout: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python_version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python_version }}
          cache: "pip"
          cache-dependency-path: ${{ matrix.requirements }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r ${{ matrix.requirements }}
          pip install pytest httpx pytest-asyncio
        shell: bash

      - name: Install eSpeak NG
        if: matrix.module_name == 'SpeechLLm'
        shell: powershell
        run: |
          # Download espeak-ng MSI from GitHub releases
          $url = "https://github.com/espeak-ng/espeak-ng/releases/download/1.51/espeak-ng-X64.msi"
          Invoke-WebRequest -Uri $url -OutFile "espeak-ng.msi"
          Start-Process msiexec.exe -ArgumentList '/i espeak-ng.msi /quiet /qn /norestart' -Wait
          # Add to PATH for subsequent steps
          echo "C:\Program Files\eSpeak NG" | Out-File -Append -FilePath $env:GITHUB_PATH
          # Verify
          & "C:\Program Files\eSpeak NG\espeak-ng.exe" --version

      # Run from repo root — pytest.ini and conftest.py handle paths
      - name: Run unit tests
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          PYTHONPATH: ${{ matrix.extra_pythonpath }}
        run: |
          python -m pytest ${{ matrix.test_dir }} \
            --override-ini="pythonpath=${{ matrix.extra_pythonpath }}" \
            --junitxml=test-results/${{ matrix.artifact_name }}.xml
        shell: bash

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: test-results/${{ matrix.artifact_name }}.xml

  # ─────────────────────────────────────────────────────────────────────────────
  # Summary — collects JUnit XML from all modules
  # ─────────────────────────────────────────────────────────────────────────────
  test-summary:
    name: "📋 Test Summary"
    runs-on: ubuntu-latest
    needs: [unit-tests]
    if: always()

    steps:
      - name: Download all test result artifacts
        uses: actions/download-artifact@v4
        with:
          path: all-results/

      - name: Publish combined test report
        uses: mikepenz/action-junit-report@v4
        with:
          report_paths: "all-results/**/*.xml"
          check_name: "Unit Test Results (All Modules)"
          fail_on_failure: true

      - name: Summarize job outcomes
        run: |
          echo "## 🧪 Release Test Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Module | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| 🤖 AgenticRAG Gemini | ${{ needs.unit-tests.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 🗣️ SpeechLLM          | ${{ needs.unit-tests.result }} |" >> $GITHUB_STEP_SUMMARY
